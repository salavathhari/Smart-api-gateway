version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth:9001
      - USER_SERVICE_URL=http://user-service:8001
      - CHAT_SERVICE_URL=http://chat:9002
      - AI_SERVICE_URL=http://ai:9003
      - DATABASE_URL=mongodb://host.docker.internal:27017/smart-api-gateway
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_started
      user-service:
        condition: service_started
      chat:
        condition: service_started
      ai:
        condition: service_started
    volumes:
      - ..:/app
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --reload

  auth:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m services.auth_service.main
    ports:
      - "9001:9001"

  user-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m services.user_service.main
    ports:
      - "8001:8001"

  chat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m services.chat_service.main
    ports:
      - "9002:9002"

  ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m services.ai_service.main
    ports:
      - "9003:9003"
    environment:
      - REDIS_URL=redis://redis:6379


